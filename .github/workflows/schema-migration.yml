name: Apply schema migration

# Runs automatically on push to main when schema.ts or drizzle migrations change.
# Uses `drizzle-kit migrate` to apply SQL migration files — deterministic, no TTY required.

on:
  push:
    branches: [main]
    paths:
      - "data/schema.ts"
      - "drizzle/**"

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate
