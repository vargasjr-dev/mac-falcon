name: Apply schema migration

# Runs automatically on push to main when schema.ts changes.
# Uses `drizzle-kit push --force` to sync the DB — safe for Neon (idempotent on existing tables).

on:
  push:
    branches: [main]
    paths:
      - "data/schema.ts"
      - "drizzle/**"

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push schema to DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:push
