name: Run data migration

# Trigger manually from the Actions tab, or by adding the `run-migration` label
# to a PR that contains a file in migrations/data/.
#
# Convention:
#   - Migration files live in migrations/data/
#   - Naming: NNN-description.ts (e.g. 001-seed-bom.ts)
#   - One migration per PR — open, trigger, close without merging
#   - The workflow runs the newest file (by name sort) in migrations/data/
#     unless a specific file is given via workflow_dispatch input
#
# Required secret: DATABASE_URL
#   Add via: GitHub repo → Settings → Secrets → Actions → New repository secret

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: "Migration file to run (e.g. migrations/data/001-seed-bom.ts). Leave blank to auto-detect from PR branch."
        required: false
        default: ""

  pull_request:
    types: [labeled]
    branches: [main]

jobs:
  migrate:
    # For label trigger: only run when the label is exactly `run-migration`
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-migration')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For PR label trigger, check out the PR branch
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect migration file
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.migration_file }}" ]; then
            echo "file=${{ github.event.inputs.migration_file }}" >> $GITHUB_OUTPUT
          else
            # Find the newest migration file (by sort order) in migrations/data/
            FILE=$(ls migrations/data/*.ts 2>/dev/null | sort | tail -1)
            if [ -z "$FILE" ]; then
              echo "❌ No migration files found in migrations/data/"
              exit 1
            fi
            echo "file=$FILE" >> $GITHUB_OUTPUT
          fi

      - name: Run migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "▶ Running migration: ${{ steps.detect.outputs.file }}"
          bun run "${{ steps.detect.outputs.file }}"

      - name: Remove run-migration label (cleanup)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'run-migration'
            }).catch(() => {});
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Migration \`${{ steps.detect.outputs.file }}\` ran successfully. Safe to close this PR without merging.`
            });
